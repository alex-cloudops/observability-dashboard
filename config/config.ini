[dashboard]
name = Alex-CloudOps Observability Dashboard
version = 1.0.0
environment = production

[sources]
sources_file = config/sources.json
telemetry_report = data/telemetry.json
uptime_report = data/uptime.json
incidents_report = data/incidents.json
log_report = data/log_intelligence.json

[exports]
output_dir = exports
summary_file = exports/dashboard_summary.json
csv_file = exports/dashboard_export.csv
powerbi_file = exports/powerbi_dataset.json

[aws]
region = us-east-2
sns_topic_arn = arn:aws:sns:us-east-2:522822657254:cloud-telemetry-alerts

[logging]
log_level = INFO
log_file = logs/dashboard.log